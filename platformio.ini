; WiFi-CSI Radar - Cardputer ADV console
; Target: M5Stack Cardputer ADV (ESP32-S3 / StampS3, 8MB flash, no PSRAM)
; WiFi credentials live in credentials.ini (gitignored). Copy credentials.ini.example to get started.

[platformio]
extra_configs = credentials.ini
default_envs = cardputer-radar-csi

; On-device CSI mode: Cardputer connects to home WiFi and measures CSI locally.
; No S3 sensor DevKit needed. Flash with:  pio run -e cardputer-radar-csi -t upload
[env:cardputer-radar-csi]
platform = espressif32@6.12.0
board = m5stack-stamps3
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    m5stack/M5Unified@^0.2.11
    m5stack/M5Cardputer@^1.1.1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_M5Stack_StampS3
    -DRADAR_FAKE=0
    -DRADAR_RX_PIN=1
    -DRADAR_TX_PIN=2
    -Os
    -DRADAR_CSI=1
    '-DHOME_SSID="${credentials.home_ssid}"'
    '-DHOME_PASS="${credentials.home_pass}"'

