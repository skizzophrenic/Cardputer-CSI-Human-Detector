; WiFi-CSI Radar - Cardputer ADV console
; Target: M5Stack Cardputer ADV (ESP32-S3 / StampS3, 8MB flash, no PSRAM)
; WiFi credentials live in credentials.ini (gitignored). Copy credentials.ini.example to get started.

[platformio]
extra_configs = credentials.ini

[env:cardputer-radar]
platform = espressif32@6.12.0
board = m5stack-stamps3
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 460800

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_M5Stack_StampS3
    ; ---- POC behaviour --------------------------------------------------
    ; 1 = synthesize data, no sensor needed (default).  0 = live C5 over Grove.
    -DRADAR_FAKE=0
    ; Grove UART pins for the C5 link. CONFIRM these for the ADV before going
    ; live (Cardputer Grove is classically G1/G2). Only used when RADAR_FAKE=0.
    -DRADAR_RX_PIN=1
    -DRADAR_TX_PIN=2
    -Os

lib_deps =
    m5stack/M5Unified@^0.2.11
    m5stack/M5Cardputer@^1.1.1

; ----------------------------------------------------------------------------
; To run LIVE against the Monster C5 over Grove UART:
;   pio run -e cardputer-radar-live -t upload
[env:cardputer-radar-live]
extends = env:cardputer-radar
build_flags =
    ${env:cardputer-radar.build_flags}
    -URADAR_FAKE
    -DRADAR_FAKE=0

; ----------------------------------------------------------------------------
; WiFi UDP mode: receives R,... frames from the S3 sensor over the local network.
; No wires needed. Flash with:  pio run -e cardputer-radar-wifi -t upload
; (Fully explicit — no extends/interpolation to avoid PlatformIO flag-drop bugs)
[env:cardputer-radar-wifi]
platform = espressif32@6.12.0
board = m5stack-stamps3
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    m5stack/M5Unified@^0.2.11
    m5stack/M5Cardputer@^1.1.1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_M5Stack_StampS3
    -DRADAR_FAKE=0
    -DRADAR_RX_PIN=1
    -DRADAR_TX_PIN=2
    -Os
    -DRADAR_UDP=1
    '-DWIFI_SSID="SQUACHNET"'
    '-DWIFI_PASS="radar1234"'
    '-DHOME_SSID="${credentials.home_ssid}"'
    '-DHOME_PASS="${credentials.home_pass}"'
