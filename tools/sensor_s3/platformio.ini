; ESP32-S3 WiFi-CSI sensor firmware
; Flash: pio run -t upload
; WiFi credentials live in ../../credentials.ini (gitignored).

[platformio]
src_dir = .
extra_configs = ../../credentials.ini

[env:sensor-s3]
platform  = espressif32@6.12.0
board     = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.flash_mode = qio

upload_speed  = 460800
upload_port   = COM44
monitor_speed = 115200

lib_deps = fastled/FastLED@^3.7.0

build_flags =
    '-DHOME_SSID="${credentials.home_ssid}"'
    '-DHOME_PASS="${credentials.home_pass}"'
