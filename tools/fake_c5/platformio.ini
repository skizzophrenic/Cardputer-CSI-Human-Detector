; fake_c5 sensor stub — ESP32-S3-N16R8 DevKit (CH343P bridge, COM44)
; Flash: pio run -t upload   (from this directory, or open folder in VS Code)

[platformio]
src_dir = .

[env:fake-c5]
platform  = espressif32@6.12.0
board     = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.flash_mode = qio

upload_speed = 460800
upload_port  = COM44
monitor_speed = 115200

lib_deps = fastled/FastLED@^3.7.0

; CH343P bridge handles bootloader entry automatically — no special USB flags needed.
; If upload fails: hold BOOT, tap RST, release BOOT, then retry.
